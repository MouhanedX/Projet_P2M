spring:
  application:
    name: nqms-ems-backend
    
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://mongodb:27017/nqms}
      database: nqms
      auto-index-creation: true
      
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    
  cache:
    type: simple
    cache-names: kpis, rtus, routes, alarms-active
    
server:
  port: 8080
  servlet:
    session:
      timeout: 30m
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      
logging:
  level:
    root: INFO
    com.telecom.nqms: DEBUG
    org.springframework.data.mongodb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
    
# Application specific configurations
nqms:
  auth:
    bootstrap-username: ${NQMS_AUTH_USERNAME:admin}
    bootstrap-password: ${NQMS_AUTH_PASSWORD:admin123}
    bootstrap-role: ${NQMS_AUTH_ROLE:ADMIN}
    internal-api-key: ${NQMS_INTERNAL_API_KEY:rtu-emulator-key}
  kpi:
    calculation-interval-minutes: 5
    retention-days: 365
  alarm:
    auto-acknowledge-days: 7
    retention-months: 12
  measurement:
    retention-days: 90
  event:
    retention-days: 180
  websocket:
    enabled: true
    endpoint: /ws
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:4200"
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
